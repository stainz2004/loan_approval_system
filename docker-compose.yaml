services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loanapp
      POSTGRES_USER: loanapp
      POSTGRES_PASSWORD: loanapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/loanapp
      SPRING_DATASOURCE_USERNAME: loanapp
      SPRING_DATASOURCE_PASSWORD: loanapp
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: